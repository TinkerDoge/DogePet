<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" font-family="Segoe UI, Roboto, Helvetica, Arial" font-size="13">
  <defs>
    <style>
      .box { fill:#fff; stroke:#333; stroke-width:1.2; rx:6; }
      .title { font-weight:600; }
      .arrow { stroke:#555; stroke-width:1.2; marker-end:url(#arrow); fill:none; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#555" />
    </marker>
  </defs>

  <rect x="20" y="20" width="780" height="480" fill="#fafafa" stroke="#ddd"/>
  <text x="30" y="45" class="title">DogePet Behavior Tree (High-Level)</text>

  <!-- Columns -->
  <rect class="box" x="40" y="70" width="180" height="120"/>
  <text x="50" y="90" class="title">Sensors</text>
  <text x="50" y="110">IMU (MotionSector)</text>
  <text x="50" y="130">Touch / Buttons</text>
  <text x="50" y="150">BLE / WiFi / Notifications</text>

  <rect class="box" x="240" y="70" width="160" height="120"/>
  <text x="250" y="90" class="title">Status</text>
  <text x="250" y="110">Mood flags</text>
  <text x="250" y="130">Power state</text>
  <text x="250" y="150">Talkative level</text>

  <rect class="box" x="430" y="70" width="170" height="120"/>
  <text x="440" y="90" class="title">Brain</text>
  <text x="440" y="110">Gemini prompts</text>
  <text x="440" y="130">Compact responses</text>
  <text x="440" y="150">Actions: Display/Voice/Toast</text>

  <rect class="box" x="630" y="70" width="150" height="120"/>
  <text x="640" y="90" class="title">Vitals</text>
  <text x="640" y="110">Battery</text>
  <text x="640" y="130">Clock</text>
  <text x="640" y="150">Notifications</text>

  <rect class="box" x="140" y="230" width="530" height="120"/>
  <text x="150" y="250" class="title">UI/Animations/Display/Voice</text>
  <text x="150" y="270">Display: RoboEyes + overlays</text>
  <text x="150" y="290">Voice: SFX + sequences + mic</text>
  <text x="150" y="310">UI: status bar, clock, notif, toast</text>

  <!-- Arrows -->
  <path class="arrow" d="M220,130 C230,130 235,130 240,130"/>
  <path class="arrow" d="M400,130 C410,130 420,130 430,130"/>
  <path class="arrow" d="M600,130 C610,130 620,130 630,130"/>
  <path class="arrow" d="M320,190 C320,210 320,220 320,230"/>
  <path class="arrow" d="M515,190 C515,210 515,220 515,230"/>
  <path class="arrow" d="M705,190 C705,210 705,220 705,230"/>

  <text x="40" y="440" fill="#666">Loop: Sensors.update → MotionSector.update → Brain.update → Status → Display/Voice → UI overlays</text>
</svg>
