<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogePet OS v2.0 // DARK</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="retro-dark">
    <div class="halftone-overlay"></div>
    
    <div class="desktop-wrapper">
        <header class="taskbar">
            <div class="brand">DOGEPET_SYSTEM.EXE</div>
            <div id="status" class="status-chip disconnected">
                <span class="status-dot"></span>
                <span id="statusText">SYSTEM_OFFLINE</span>
            </div>
        </header>

        <main class="grid-layout">
            <div class="column">
                <section class="window">
                    <div class="window-header">LIVE_VISION.BMP</div>
                    <div class="window-content oled-preview">
                        <div class="canvas-container">
                            <canvas id="oledCanvas" width="128" height="64"></canvas>
                        </div>
                        <div class="meta">RESOLUTION: 128x64 PIXELS</div>
                    </div>
                </section>

                <section class="window">
                    <div class="window-header">COM_PORT_PROTOCOL</div>
                    <div class="window-content connection-area">
                        <select id="portSelect">
                            <option value="">SCANNING PORTS...</option>
                        </select>
                        <div class="button-row">
                            <button id="refreshBtn" class="btn-retro">RESCAN</button>
                            <button id="connectBtn" class="btn-retro primary">CONNECT</button>
                        </div>
                    </div>
                </section>
            </div>

            <div class="column">
                <section class="window">
                    <div class="window-header">EYE_GEOMETRY_MATRIX</div>
                    <div class="window-content">
                        <div class="slider-box">
                            <label>WIDTH <span id="widthVal">28</span></label>
                            <input type="range" id="width" min="10" max="60" value="28">
                        </div>
                        <div class="slider-box">
                            <label>HEIGHT <span id="heightVal">40</span></label>
                            <input type="range" id="height" min="10" max="60" value="40">
                        </div>
                        <div class="slider-box">
                            <label>RADIUS <span id="radiusVal">8</span></label>
                            <input type="range" id="radius" min="0" max="20" value="8">
                        </div>
                        <div class="slider-box">
                            <label>SPACING <span id="spacingVal">10</span></label>
                            <input type="range" id="spacing" min="-20" max="40" value="10">
                        </div>
                    </div>
                </section>

                <section class="window">
                    <div class="window-header">POSITION_VECTORS</div>
                    <div class="window-content pos-center">
                        <div class="pos-grid" id="posGrid">
                            <button class="pos-btn" data-value="8">↖</button>
                            <button class="pos-btn" data-value="1">↑</button>
                            <button class="pos-btn" data-value="2">↗</button>
                            <button class="pos-btn" data-value="7">←</button>
                            <button class="pos-btn active" data-value="0">●</button>
                            <button class="pos-btn" data-value="3">→</button>
                            <button class="pos-btn" data-value="6">↙</button>
                            <button class="pos-btn" data-value="5">↓</button>
                            <button class="pos-btn" data-value="4">↘</button>
                        </div>
                    </div>
                </section>
            </div>

            <div class="column">
                <section class="window">
                    <div class="window-header">EMOTION_CHIP</div>
                    <div class="window-content mood-grid" id="moodGroup">
                        <button class="option-btn active" data-value="0">DEFAULT</button>
                        <button class="option-btn" data-value="1">TIRED</button>
                        <button class="option-btn" data-value="2">ANGRY</button>
                        <button class="option-btn" data-value="3">HAPPY</button>
                    </div>
                </section>

                <section class="window">
                    <div class="window-header">SYSTEM_FLAGS</div>
                    <div class="window-content flag-list">
                        <label class="flag"><input type="checkbox" id="autoBlink" checked><span>AUTO_BLINK</span></label>
                        <label class="flag"><input type="checkbox" id="idleMode" checked><span>IDLE_MODE</span></label>
                        <label class="flag"><input type="checkbox" id="cyclops"><span>CYCLOPS_MODE</span></label>
                        <label class="flag"><input type="checkbox" id="curiosity"><span>CURIOSITY_SIM</span></label>
                        <label class="flag"><input type="checkbox" id="sweat"><span>SWEAT_LAYER</span></label>
                    </div>
                </section>

                <section class="window">
                    <div class="window-header">MACRO_OVERRIDE</div>
                    <div class="window-content action-stack">
                        <button class="action-btn" data-action="blink">BLINK.EXE</button>
                        <button class="action-btn" data-action="laugh">LAUGH.EXE</button>
                        <button class="action-btn" data-action="confused">CONFUSE.EXE</button>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
