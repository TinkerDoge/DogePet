<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogePet Config v2.0</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Override for single-window scrollable layout */
        .main-panel {
            padding: 30px;
            scroll-behavior: smooth;
        }
        .section-card {
            margin-bottom: 40px; /* More space between sections */
        }
    </style>
</head>
<body>

    <div class="main-window">
        <!-- Title Bar -->
        <div class="title-bar">
            <div class="window-controls">
                <div class="control-dot" style="background:var(--accent-red)"></div>
                <div class="control-dot" style="background:var(--accent-yellow)"></div>
                <div class="control-dot" style="background:var(--accent-green)"></div>
            </div>
            <div class="title-text">UNIFIED_CONFIGurator.EXE</div>
            <div style="width: 40px"></div>
        </div>

        <!-- Toolbar (Connection Only) -->
        <div class="toolbar">
            <div style="font-family:'VT323'; font-size:1.2rem; color:var(--text-color); margin-right:10px;">COM_PORT:</div>
            <select id="portSelect" style="width: 150px; padding: 6px; border:3px solid var(--border-color); border-radius:6px;">
                <option value="">Scanning...</option>
            </select>
            <button id="btnConnect" class="nav-btn" style="padding: 6px 15px;">CONNECT</button>
            
            <div class="connection-status">
                <div id="statusInd" class="status-indicator">OFFLINE</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content-area">
            <div class="main-panel" id="mainContent">
                
                <!-- IDENTITY -->
                <div class="section-card">
                    <div class="section-title">IDENTITY</div>
                    <div class="form-group">
                        <label>BOT NAME</label>
                        <input type="text" name="bot_name" id="bot_name" maxlength="31">
                    </div>
                </div>

                <!-- DISPLAY & EYES -->
                <div class="section-card">
                    <div class="section-title">VISUALS_MODULE</div>
                    <div class="form-row">
                        <div class="full-width">
                            <label>EYE_WIDTH (px)</label>
                            <input type="range" name="eye.width" min="10" max="60" oninput="updateDisp(this, 'val_ew')">
                            <span id="val_ew">28</span>
                        </div>
                        <div class="full-width">
                            <label>EYE_HEIGHT (px)</label>
                            <input type="range" name="eye.height" min="10" max="60" oninput="updateDisp(this, 'val_eh')">
                            <span id="val_eh">40</span>
                        </div>
                    </div>
                    <div class="form-row" style="margin-top:10px">
                        <div class="full-width">
                            <label>EYE_RADIUS (px)</label>
                            <input type="range" name="eye.radius" min="0" max="30" oninput="updateDisp(this, 'val_er')">
                            <span id="val_er">8</span>
                        </div>
                        <div class="full-width">
                            <label>SPACING (px)</label>
                            <input type="range" name="eye.spacing" min="0" max="50" oninput="updateDisp(this, 'val_es')">
                            <span id="val_es">10</span>
                        </div>
                    </div>
                    <div class="form-row" style="margin-top:15px">
                        <label class="checkbox-wrapper full-width">
                            <input type="checkbox" name="eye.auto_blink">
                            <span>AUTO_BLINK</span>
                        </label>
                        <label class="checkbox-wrapper full-width">
                            <input type="checkbox" name="eye.idle_mode">
                            <span>IDLE_LOOKING</span>
                        </label>
                    </div>
                    <div class="form-row" style="margin-top:5px">
                        <label class="checkbox-wrapper full-width">
                            <input type="checkbox" name="eye.cyclops">
                            <span>CYCLOPS_MODE</span>
                        </label>
                        <label class="checkbox-wrapper full-width">
                            <input type="checkbox" name="eye.sweat">
                            <span>SWEAT_EFFECT</span>
                        </label>
                    </div>
                    <div class="form-row" style="margin-top:15px">
                        <div class="full-width">
                            <label>BLINK_INT (s)</label>
                            <input type="number" name="eye.blink_int">
                        </div>
                        <div class="full-width">
                            <label>IDLE_INT (s)</label>
                            <input type="number" name="eye.idle_int">
                        </div>
                    </div>
                    <hr style="margin:20px 0; border:1px dashed var(--border-color); opacity:0.3;">
                    <div class="form-row">
                        <div class="full-width">
                            <label>OLED_CONTRAST (0-255)</label>
                            <input type="range" name="screen.con" min="0" max="255" oninput="updateDisp(this, 'val_con')">
                            <span id="val_con" style="font-size:0.7rem; font-weight:bold">255</span>
                        </div>
                        <label class="checkbox-wrapper full-width">
                            <input type="checkbox" name="screen.flip">
                            <span>ROTATE_180</span>
                        </label>
                    </div>
                </div>

                <!-- MOTION -->
                <div class="section-card">
                    <div class="section-title">MPU_SENSITIVITY</div>
                    <div class="form-group">
                        <div style="display:flex; justify-content:space-between"><label>TILT_THRESHOLD</label><span id="val_tilt">20</span></div>
                        <input type="range" min="5" max="60" name="motion.tilt" oninput="updateDisp(this, 'val_tilt')">
                    </div>
                    <div class="form-group">
                        <div style="display:flex; justify-content:space-between"><label>SHAKE_THRESHOLD</label><span id="val_shake">200</span></div>
                        <input type="range" min="100" max="800" name="motion.shake" oninput="updateDisp(this, 'val_shake')">
                    </div>
                    <div class="form-group">
                        <div style="display:flex; justify-content:space-between"><label>FURIOUS_THRESHOLD</label><span id="val_furious">400</span></div>
                        <input type="range" min="200" max="1000" name="motion.furious" oninput="updateDisp(this, 'val_furious')">
                    </div>
                    <div class="form-group">
                        <div style="display:flex; justify-content:space-between"><label>TAP_SENSITIVITY</label><span id="val_tap">150</span></div>
                        <input type="range" min="50" max="500" name="motion.tap" oninput="updateDisp(this, 'val_tap')">
                    </div>
                </div>

                <!-- FEEDBACK & SYSTEM -->
                <div class="section-card">
                    <div class="section-title">SYSTEM_FEEDBACK</div>
                    <div class="form-row">
                        <div class="full-width">
                            <label>AUDIO_VOLUME</label>
                            <input type="range" name="audio.vol" min="0" max="100" oninput="updateDisp(this, 'val_vol')">
                            <span id="val_vol">100</span>
                        </div>
                        <div class="full-width">
                            <label>MIC_SENSITIVITY (dB)</label>
                            <input type="range" name="audio.mic_t" min="1" max="20" oninput="updateDisp(this, 'val_mic')">
                            <span id="val_mic">5</span>
                        </div>
                    </div>
                    <div class="form-row" style="margin-top:10px">
                        <div class="full-width">
                            <label>HAPTIC_INTENSITY</label>
                            <input type="range" name="haptic_int" min="0" max="255" oninput="updateDisp(this, 'val_hap')">
                            <span id="val_hap">255</span>
                        </div>
                    </div>
                    <div class="form-group" style="margin-top:15px">
                        <label>STATUS_LED_COLOR (R G B)</label>
                        <div class="form-row">
                            <input type="number" name="led.r" placeholder="R" min="0" max="255">
                            <input type="number" name="led.g" placeholder="G" min="0" max="255">
                            <input type="number" name="led.b" placeholder="B" min="0" max="255">
                        </div>
                        <div style="margin-top:10px">
                            <label>LED_BRIGHTNESS</label>
                            <input type="range" name="led.bri" min="0" max="255" oninput="updateDisp(this, 'val_lebri')">
                            <span id="val_lebri">100</span>
                        </div>
                    </div>
                    <hr style="margin:20px 0; border:1px dashed var(--border-color); opacity:0.3;">
                    <div class="form-row">
                        <div class="full-width">
                            <label>IDLE_DIM_MS</label>
                            <input type="number" name="power.idle_ms">
                        </div>
                        <div class="full-width">
                            <label>SLEEP_MS</label>
                            <input type="number" name="power.sleep_ms">
                        </div>
                    </div>
                </div>

            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <div class="monitor-screen" id="logOutput">
                    > READY_FOR_SYNC...
                </div>
                
                <button id="btnSave" class="action-btn">
                    SAVE & REBOOT
                </button>
                
                <div style="margin-top:auto">
                    <button id="btnReboot" class="action-btn btn-white" style="font-size: 0.8rem">REBOOT_ONLY</button>
                    <button id="btnReset" class="action-btn btn-red" style="font-size: 0.8rem">FACTORY_RESET</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        function updateDisp(el, id) {
            document.getElementById(id).innerText = el.value;
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
